# Site Configuration
defaultLocale: en
locales: [en, zh]

title:
  en: "1 Hour Guide"
  zh: "一小时指南"

description:
  en: "Learn anything in 1 hour. Hands-on tutorials, no fluff."
  zh: "一小时学会任何技能。动手教程，无废话。"

domain: 1hour.guide
url: https://1hour.guide

author:
  name: Zoe
  url: https://zoe.im
  email: hi@zoe.im
  twitter: noboddyim
  github: jiusanzhou

theme:
  primary: "#FF6B35"
  primaryGradientEnd: "#F7931E"

# Analytics (optional, all fields optional)
analytics:
  # Google Analytics 4 (free, no need for payment)
  googleAnalytics:
    id: G-G6W0CYL4LD

  # Counterscale (self-hosted on Cloudflare Workers, free tier)
  counterscale:
    siteId: "1hour-guide"
    # Optional: Dashboard URL (for admin access)
    dashboardUrl: https://counterscale.wuma.workers.dev
    # Optional: Protect dashboard with password (set via Counterscale CLI)
    # password: "your-dashboard-password"

  # Plausible (privacy-friendly, requires payment) - disabled
  # plausible:
  #   domain: 1hour.guide

# Social / Open Graph
social:
  # Default OG image. Leave empty to auto-generate from title.
  ogImage: /og-default.png
  twitterCard: summary_large_image
